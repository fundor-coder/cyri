services:
  cyri:
    build: .
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      CYRI_DATA_DIR: /app/data
      CYRI_PUBLISH_PASSWORD: ${CYRI_PUBLISH_PASSWORD:-}
      CYRI_PUBLISH_PASSWORD_HASH: ${CYRI_PUBLISH_PASSWORD_HASH:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_TRANSLATION_MODEL: ${OPENAI_TRANSLATION_MODEL:-gpt-5.4-mini}
      OPENAI_RESEARCH_MODEL: ${OPENAI_RESEARCH_MODEL:-gpt-5.4-mini}
    volumes:
      - cyri-data:/app/data

volumes:
  cyri-data:
    name: cyri-data
