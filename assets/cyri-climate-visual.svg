<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 940" role="img" aria-labelledby="title desc">
  <title id="title">Abstract climate research visual</title>
  <desc id="desc">A clean abstract visual with climate data lines, an Earth horizon and subtle renewable energy forms.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.48" stop-color="#edf8fb"/>
      <stop offset="1" stop-color="#f7fbfa"/>
    </linearGradient>
    <linearGradient id="horizon" x1="0.14" x2="0.9" y1="0.17" y2="0.9">
      <stop offset="0" stop-color="#dff7ee"/>
      <stop offset="0.52" stop-color="#cae9ff"/>
      <stop offset="1" stop-color="#ecebff"/>
    </linearGradient>
    <linearGradient id="inkLine" x1="0" x2="1">
      <stop offset="0" stop-color="#16835f"/>
      <stop offset="0.55" stop-color="#2774d8"/>
      <stop offset="1" stop-color="#6e69c7"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#14324a" flood-opacity="0.16"/>
    </filter>
    <filter id="smallShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#1a3448" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1440" height="940" fill="url(#sky)"/>
